<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Feed Formulation App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <h2 class="text-3xl font-bold text-gray-800 text-center mb-6">🔑 Login</h2>

        {% if form.errors %}
        <div class="bg-red-100 text-red-700 p-3 rounded mb-4">
            ⚠ Username or password is incorrect.
        </div>
        {% endif %}

        <form method="post" action="/accounts/login/" class="space-y-4">
            {% csrf_token %}

            <div>
                <label for="username" class="block text-gray-700 font-semibold mb-1">Username</label>
                <input type="text" name="username" id="username"
                       class="w-full border border-gray-300 px-3 py-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
                       placeholder="Enter your username" required>
            </div>

            <div>
                <label for="password" class="block text-gray-700 font-semibold mb-1">Password</label>
                <input type="password" name="password" id="password"
                       class="w-full border border-gray-300 px-3 py-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
                       placeholder="Enter your password" required>
            </div>

            <button type="submit"
                    class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition">
                Login
            </button>
        </form>

        <!-- Sign Up Link -->
        <p class="mt-6 text-center text-gray-600">
            Don't have an account?
            <a href="{% url 'register' %}"
               class="text-blue-600 font-semibold hover:underline">
                Sign Up
            </a>
        </p>

        <!-- Forgot Password -->
        <p class="mt-3 text-sm text-gray-500 text-center">
            Forgot password? Contact the administrator.
        </p>

    </div>

</body>
</html>
