<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>

        body{
            font-family:Arial,sans-serif;
            background:#f4f7fc;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            width:420px;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 8px 20px rgba(0,0,0,.15);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#1f2937;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:8px;
            margin-bottom:18px;
            border:1px solid #ccc;
            border-radius:8px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }

        p{
            text-align:center;
            margin-top:18px;
        }

        a{
            color:#2563eb;
            text-decoration:none;
        }

    </style>

</head>

<body>

<div class="card">

    <h2>Create Account</h2>

    <form method="post">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Register
        </button>

    </form>

    <p>
        Already have an account?
        <a href="{% url 'login' %}">
            Login
        </a>
    </p>

</div>

</body>
</html>
